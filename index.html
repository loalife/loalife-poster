/* Notification banner */
.yl-notif-banner{display:flex;align-items:center;justify-content:space-between;background:#FFF4D6;border:1.5px solid #F5C842;border-radius:14px;padding:10px 14px;margin-bottom:14px;gap:10px;font-size:13px;color:#7A5F00;font-weight:600;}
.yl-notif-allow{flex:0 0 auto;background:#FF4D8D;color:#fff;border:none;border-radius:99px;padding:6px 14px;font-size:12px;font-weight:800;font-family:inherit;cursor:pointer;}
.yl-notif-small{background:#FF4D8D;color:#fff;border:none;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:800;font-family:inherit;cursor:pointer;margin-left:6px;}
/* Birthday section */
.yl-bday-section{background:#fff0f6;border-radius:16px;padding:12px 14px;margin-bottom:14px;border:1.5px solid #FFC3DC;}
.yl-bday-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #FFDDED;}
.yl-bday-row:last-child{border-bottom:none;}
.yl-bday-emoji{font-size:20px;line-height:1;}
.yl-bday-name{flex:1;font-size:14px;font-weight:700;color:#3A2E3F;}
.yl-bday-date{font-size:13px;color:#9A86A8;}
.yl-bday-tag{background:#FFE0EC;color:#FF2D7E;border-radius:99px;padding:3px 10px;font-size:12px;font-weight:800;}
.yl-bday-tag.today{background:#FF4D8D;color:#fff;}
/* Birthday pill */
.yl-pill.bday{background:#FFE0EC;color:#FF2D7E;}
/* Notification badge on items */
.yl-notif-badge{background:#FFF4D6;color:#D99400;border-radius:99px;padding:2px 8px;font-size:11px;font-weight:700;}
/* Mobile: always show delete button */
@media (hover: none) {.yl-del{opacity:1;}}

.yl-me-emoji-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:0 4px 0 0;line-height:1;vertical-align:middle;transition:transform .15s;}.yl-me-emoji-btn:hover{transform:scale(1.2);}
.yl-emoji-pick.on{outline:3px solid #FF4D8D;border-radius:6px;}

.yl-timepick{display:inline-flex;align-items:center;gap:2px;margin-top:4px;}.yl-tsel{border:1.5px solid #E8D5EF;border-radius:8px;padding:5px 4px;font-size:14px;font-family:inherit;color:#3A2E3F;background:#fff;-webkit-appearance:none;text-align:center;}.yl-tcolon{font-weight:800;color:#9A86A8;padding:0 1px;}


.yl-me-bday{margin-top:10px;padding-top:8px;border-top:1px solid #F3E7EF;}
.yl-me-bday-btn{background:none;border:none;font-size:13px;color:#C06A99;font-weight:700;font-family:inherit;cursor:pointer;padding:2px 0;text-decoration:underline dotted;}
.yl-me-bday-edit{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}


/* Family sharing */
.yl-head{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;}
.yl-share-btn{border:none;border-radius:99px;padding:7px 14px;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;background:#F3E7EF;color:#C06A99;transition:all .2s;}
.yl-share-btn.active{background:linear-gradient(135deg,#FF4D8D,#9B6DFF);color:#fff;box-shadow:0 3px 10px rgba(255,77,141,.25);}
.yl-modal.share{max-width:360px;}
.yl-share-desc{font-size:13px;color:#7A6C88;line-height:1.5;margin-bottom:12px;}
.yl-share-error{font-size:12px;color:#E5484D;background:#FFF0F0;border-radius:8px;padding:8px 12px;margin-bottom:10px;}
.yl-share-choice{display:block;width:100%;border:2px solid #F3E7EF;border-radius:14px;padding:13px;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;background:#fff;color:#3A2E3F;margin-bottom:10px;text-align:left;transition:all .2s;}
.yl-share-choice.primary{background:linear-gradient(135deg,#FF4D8D,#9B6DFF);color:#fff;border-color:transparent;}
.yl-share-choice:hover{border-color:#FF4D8D;}
.yl-google-btn{display:flex;align-items:center;gap:10px;width:100%;border:2px solid #E8E8E8;border-radius:14px;padding:13px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;background:#fff;color:#3A2E3F;margin-bottom:14px;justify-content:center;}
.yl-google-btn:hover{box-shadow:0 2px 8px rgba(0,0,0,.1);}
.yl-invite-box{background:#F9F4FF;border-radius:14px;padding:14px;text-align:center;margin-bottom:12px;}
.yl-invite-label{font-size:11px;color:#9A86A8;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.yl-invite-code{font-size:32px;font-weight:900;letter-spacing:.18em;color:#FF4D8D;margin:6px 0;}
.yl-copy-btn{border:none;border-radius:99px;padding:8px 18px;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;background:linear-gradient(135deg,#FF4D8D,#9B6DFF);color:#fff;margin-top:4px;}
.yl-share-status{display:flex;align-items:center;gap:6px;font-size:13px;color:#3A2E3F;font-weight:700;margin-bottom:14px;}
.yl-share-dot{width:8px;height:8px;border-radius:50%;background:#2FC9A8;flex-shrink:0;}
.yl-share-info{background:#F9F4FF;border-radius:12px;padding:14px;margin-bottom:14px;}

/* Visibility toggle */
.yl-vis-toggle{border:2px solid #F3E7EF;border-radius:99px;padding:8px 14px;font-size:12px;font-weight:800;font-family:inherit;cursor:pointer;background:#fff;color:#9A86A8;transition:all .2s;}
.yl-vis-toggle.household{background:#E8FBF5;border-color:#2FC9A8;color:#0E9E8E;}
.yl-vis-toggle.private{background:#F9F4FF;border-color:#C8B8E8;color:#7C4DFF;}
.yl-pill.vis{background:#E8FBF5;color:#0E9E8E;}
.yl-pill.vis.private{background:#F9F4FF;color:#7C4DFF;}

/* Status dashboard (home tab) */
.yl-dashboard{background:#fff;border-radius:18px;padding:14px;margin-bottom:18px;box-shadow:0 4px 16px rgba(120,80,160,.09);}
.yl-dash-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.yl-cal-export{border:none;border-radius:99px;padding:7px 14px;font-size:12px;font-weight:800;font-family:inherit;cursor:pointer;background:#F0F7FF;color:#3B7BF6;transition:all .2s;}
.yl-cal-export:hover{background:#E0EEFF;}
.yl-dash-group{margin-bottom:14px;}
.yl-dash-group:last-child{margin-bottom:0;}
.yl-dash-group-head{display:flex;align-items:center;gap:7px;background:none;border:none;cursor:pointer;padding:0;margin-bottom:8px;font-family:inherit;}
.yl-dash-emoji{font-size:20px;}
.yl-dash-name{font-size:14px;font-weight:800;color:#3A2E3F;}
.yl-dash-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:6px;}
.yl-dash-item{display:flex;align-items:center;gap:8px;background:#FAFAFA;border-radius:10px;padding:9px 10px;}
.yl-dash-item-emoji{font-size:17px;flex-shrink:0;}
.yl-dash-item-text{flex:1;font-size:13px;font-weight:600;color:#3A2E3F;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.yl-dash-item-time{font-size:12px;color:#9A86A8;font-weight:500;margin-left:4px;}
.yl-dash-tag{flex-shrink:0;font-size:11px;font-weight:800;padding:3px 8px;border-radius:99px;background:#F3E7EF;color:#C06A99;}
.yl-dash-tag.today{background:#FFE0EC;color:#FF2D7E;}
.yl-dash-tag.soon{background:#FFF4D6;color:#D99400;}
.yl-dash-tag.over{background:#FFE8E8;color:#E5484D;}
.yl-dash-tag.normal{background:#F3F3F3;color:#9A86A8;}

/* Calendar add links */
.yl-cal-add{font-size:15px;text-decoration:none;opacity:.6;transition:opacity .2s;flex-shrink:0;}
.yl-cal-add:hover{opacity:1;}
.yl-cal-item{font-size:12px;text-decoration:none;opacity:.5;transition:opacity .2s;padding:2px 4px;border-radius:4px;}
.yl-cal-item:hover{opacity:1;background:#EEF4FF;}


/* 1タップ追加パネル */
.yl-quickbar{background:#fff;border-radius:18px;padding:14px;margin-bottom:14px;box-shadow:0 4px 16px rgba(120,80,160,.09);}
.yl-quickbar-label{font-size:11px;font-weight:800;color:#9A86A8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.yl-quickbar-grid{display:flex;flex-direction:column;gap:6px;}
.yl-quickbar-item{display:flex;align-items:center;gap:10px;border:none;border-radius:12px;padding:10px 12px;background:#FAFAFA;cursor:pointer;font-family:inherit;text-align:left;width:100%;transition:background .15s;}
.yl-quickbar-item:hover{background:#F3E7EF;}
.yl-quickbar-ico{font-size:20px;flex-shrink:0;}
.yl-quickbar-info{flex:1;display:flex;flex-direction:column;gap:1px;}
.yl-quickbar-name{font-size:13px;font-weight:800;color:#3A2E3F;}
.yl-quickbar-prev{font-size:11px;color:#9A86A8;}
.yl-quickbar-plus{font-size:18px;font-weight:700;color:#FF4D8D;flex-shrink:0;}

/* Quick-add modal */
.yl-modal.quickadd{padding:22px;}
.yl-quickadd-head{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #F3E7EF;}
.yl-quickadd-ico{font-size:32px;}
.yl-quickadd-name{font-size:17px;font-weight:800;color:#3A2E3F;margin-bottom:2px;}
.yl-quickadd-prev{font-size:12px;color:#9A86A8;}

/* 前回コピーボタン（カードの中） */
.yl-prev-copy{border:none;background:none;font-size:11px;font-weight:700;color:#9B6DFF;cursor:pointer;padding:2px 6px;border-radius:6px;font-family:inherit;transition:background .15s;}
.yl-prev-copy:hover{background:#F3EEFF;}
</style>
